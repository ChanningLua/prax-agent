# Task classification rules
# Pattern: keyword match -> tier -> model selection

rules:
  - name: simple_query
    keywords: ["解释", "说明", "是什么", "explain", "what is"]
    tier: low
    description: "Simple Q&A tasks"

  - name: code_read
    keywords: ["读取", "查看", "分析", "read", "analyze", "review"]
    tier: standard
    description: "Code reading and analysis"

  - name: code_write
    keywords: ["编写", "实现", "创建", "write", "implement", "create"]
    tier: standard
    description: "Code writing tasks"

  - name: code_refactor
    keywords: ["重构", "优化", "refactor", "optimize"]
    tier: high
    description: "Code refactoring"

  - name: architecture
    keywords: ["架构", "设计", "architecture", "design"]
    tier: premium
    description: "Architecture design"

# Tier to model mapping (uses first available)
tier_models:
  low: ["gpt-4.1-mini", "gpt-5.4"]
  standard: ["gpt-5.4", "claude-sonnet-4-7"]
  high: ["claude-sonnet-4-7", "gpt-5.4"]
  premium: ["claude-sonnet-4-7", "o3"]
  ultra: ["claude-opus-4-7"]
